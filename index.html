<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GridWild</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; width: 100%; }
    .hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1000;
      background: rgba(255,255,255,0.92);
      padding: 10px 12px;
      border-radius: 12px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-size: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      max-width: calc(100% - 24px);
    }
    .hud b { display: block; margin-bottom: 6px; }
    .btn {
      display: inline-block;
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
      background: white;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:active { transform: translateY(1px); }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="hud" id="hud">
    <b>GridWild</b>
    <div id="status">Requesting location…</div>
    <button class="btn" id="recenter">Recenter</button>
  </div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    // ─────────────────────────────────────────────────────────────
    // Map init
    // ─────────────────────────────────────────────────────────────
    const map = L.map("map", {
      zoomControl: true,
      attributionControl: true
    });

    // OSM tiles (fine for prototyping; for heavy use, use a proper tile provider)
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Default view (in case location fails)
    map.setView([38.9072, -77.0369], 13); // DC fallback

    const hud = document.getElementById("status");

    // ─────────────────────────────────────────────────────────────
    // User location marker + accuracy circle
    // ─────────────────────────────────────────────────────────────
    let userMarker = null;
    let accuracyCircle = null;
	
	// NOW PSATED FROM GPT
	
	// ─────────────────────────────────────────────────────────────
	// Fog-of-war overlay (pixel-based clear window, viewport-centered)
	// Clear window stays a fixed fraction of the screen on pan/zoom/resize
	// ─────────────────────────────────────────────────────────────

	// Put fog above tiles but below markers/popups
	map.createPane("fogPane");
	map.getPane("fogPane").style.zIndex = 450;
	map.getPane("fogPane").style.pointerEvents = "none";

	// World-sized outer ring (big rectangle covering the world)
	const FOG_WORLD_RING = [ [ 85, -180], [ 85,  180], [-85,  180], [-85, -180]];

	// Clear window as a fraction of the current map container (0..1)
	const FOG_CLEAR_FRACTION_W = 0.60;  // 60% of map width is clear
	const FOG_CLEAR_FRACTION_H = 0.60;  // 60% of map height is clear

	let fogLayer = null;

	function ringFromLatLngBounds(bounds) {
	  const sw = bounds.getSouthWest();
	  const ne = bounds.getNorthEast();
	  const nw = L.latLng(ne.lat, sw.lng);
	  const se = L.latLng(sw.lat, ne.lng);

	  // Ring order: NW -> NE -> SE -> SW
	  return [ [nw.lat, nw.lng], [ne.lat, ne.lng],[se.lat, se.lng],[sw.lat, sw.lng] ]
	}

	function updateFog() {
	  const size = map.getSize();
	  const cx = size.x / 2;
	  const cy = size.y / 2;

	  const halfW = (size.x * FOG_CLEAR_FRACTION_W) / 2;
	  const halfH = (size.y * FOG_CLEAR_FRACTION_H) / 2;

	  // Pixel-space clear rect in container coordinates
	  const pNW = L.point(cx - halfW, cy - halfH);
	  const pSE = L.point(cx + halfW, cy + halfH);

	  // Convert to lat/lng bounds (viewport-centered, fixed screen fraction)
	  const llNW = map.containerPointToLatLng(pNW);
	  const llSE = map.containerPointToLatLng(pSE);

	  const clearBounds = L.latLngBounds(llNW, llSE);
	  if (!clearBounds.isValid()) return;

	  const clearRing = ringFromLatLngBounds(clearBounds);

	  // Polygon with a hole: [outerRing, innerRing]
	  const latlngs = [FOG_WORLD_RING, clearRing];

	  if (!fogLayer) {
		fogLayer = L.polygon(latlngs, {
		  pane: "fogPane",
		  stroke: false,
		  fill: true,
		  fillColor: "#6b6f76",
		  fillOpacity: 0.55,
		  interactive: false
		}).addTo(map);
	  } else {
		fogLayer.setLatLngs(latlngs);
	  }
	}

	map.on("move zoom resize moveend zoomend", updateFog);
	updateFog();
	
	// OK END FOG CHUNK OF CODE...
	

    function setUserLocation(lat, lng, accuracyMeters) {
      const latlng = [lat, lng];

      if (!userMarker) {
        userMarker = L.marker(latlng).addTo(map).bindPopup("You are here");
      } else {
        userMarker.setLatLng(latlng);
      }

      if (!accuracyCircle) {
        accuracyCircle = L.circle(latlng, {
          radius: Math.max(accuracyMeters || 0, 5)
        }).addTo(map);
      } else {
        accuracyCircle.setLatLng(latlng);
        accuracyCircle.setRadius(Math.max(accuracyMeters || 0, 5));
      }

      hud.textContent =
        `Lat: ${lat.toFixed(6)}, Lng: ${lng.toFixed(6)} (±${Math.round(accuracyMeters)} m)`;
    }

    // ─────────────────────────────────────────────────────────────
    // Geolocation
    // ─────────────────────────────────────────────────────────────
    let lastFix = null;

    function requestLocationOnce() {
      if (!("geolocation" in navigator)) {
        hud.textContent = "Geolocation not supported in this browser.";
        return;
      }

      hud.textContent = "Requesting location permission…";

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const { latitude, longitude, accuracy } = pos.coords;
          lastFix = { latitude, longitude, accuracy };
          setUserLocation(latitude, longitude, accuracy);
          map.setView([latitude, longitude], 18);
        },
        (err) => {
          // Common causes: permission denied, not https, no GPS, timeout
          hud.textContent = `Location error: ${err.message}`;
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 5000
        }
      );
    }

    // Live tracking (optional but usually what you want on a phone)
    function startWatchingLocation() {
      if (!("geolocation" in navigator)) return null;

      return navigator.geolocation.watchPosition(
        (pos) => {
          const { latitude, longitude, accuracy } = pos.coords;
          lastFix = { latitude, longitude, accuracy };
          setUserLocation(latitude, longitude, accuracy);
        },
        (err) => {
          hud.textContent = `Location error: ${err.message}`;
        },
        {
          enableHighAccuracy: true,
          timeout: 20000,
          maximumAge: 5000
        }
      );
    }

    // ─────────────────────────────────────────────────────────────
    // UI
    // ─────────────────────────────────────────────────────────────
    document.getElementById("recenter").addEventListener("click", () => {
      if (lastFix) {
        map.setView([lastFix.latitude, lastFix.longitude], Math.max(map.getZoom(), 18));
      } else {
        requestLocationOnce();
      }
    });

    // Kick off
    requestLocationOnce();
    const watchId = startWatchingLocation();

    // If you ever need to stop tracking:
    // if (watchId !== null) navigator.geolocation.clearWatch(watchId);
  </script>
</body>
</html>
