<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GridWild</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />


	<script src="https://unpkg.com/osmtogeojson@3.0.0/osmtogeojson.js"></script>


  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; width: 100%; }
    .hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1000;
      background: rgba(255,255,255,0.92);
      padding: 10px 12px;
      border-radius: 12px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-size: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      max-width: calc(100% - 24px);
    }


  /* ─────────────────────────────────────────────────────────────
    GridWild sidebar (unobtrusive)
    ───────────────────────────────────────────────────────────── */
  .gw-sidebar{
    position:absolute;
    top:12px;
    left:12px;
    z-index:1100;
    width:240px;
    max-width: calc(100% - 24px);
    transition: transform 160ms ease;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }

  .gw-collapsed{ transform: translateX(-210px); }

  .gw-toggle{
    position:absolute;
    top:0;
    right:-42px;
    width:38px;
    height:38px;
    border-radius:12px;
    border:1px solid #ddd;
    background: rgba(255,255,255,0.92);
    box-shadow: 0 6px 18px rgba(0,0,0,0.15);
    cursor:pointer;
    font-weight:800;
  }

  .gw-panel{
    background: rgba(255,255,255,0.92);
    border:1px solid #e6e6e6;
    border-radius:14px;
    padding:10px 12px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.15);
  }

  .gw-title{
    font-weight:800;
    font-size:13px;
    margin-bottom:6px;
  }

  .gw-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin:6px 0;
    font-size:13px;
  }

  .gw-details{ margin-top:6px; }
  .gw-summary{
    cursor:pointer;
    font-weight:650;
    font-size:13px;
  }

  .gw-checklist{
    margin-top:6px;
    max-height:220px;
    overflow:auto;
    border:1px solid #eee;
    border-radius:10px;
    padding:8px;
    background: rgba(255,255,255,0.65);
  }

  .gw-checklist label{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    margin:4px 0;
  }

  .gw-hint{
    margin-top:6px;
    font-size:12px;
    opacity:0.75;
  }
  /* ─────────────────────────────────────────────────────────────
    END GridWild sidebar (unobtrusive)
    ───────────────────────────────────────────────────────────── */



    .hud b { display: block; margin-bottom: 6px; }
    .btn {
      display: inline-block;
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
      background: white;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:active { transform: translateY(1px); }
  </style>
</head>
<body>
  <div id="map"></div>


<!-- ─────────────────────────────────────────────────────────────
     Sidebar UI (collapsible)
     ───────────────────────────────────────────────────────────── -->
<div id="sidebar" class="gw-sidebar gw-collapsed">
  <button id="sidebarToggle" class="gw-toggle" title="Toggle sidebar">☰</button>

  <div class="gw-panel">
    <div class="gw-title">Layers</div>

    <label class="gw-row">
      <input type="checkbox" id="togglePoints" checked />
      <span>Show points</span>
    </label>

    <label class="gw-row">
      <input type="checkbox" id="toggleHeat" checked />
      <span>Show heat</span>
    </label>

    <div class="gw-title" style="margin-top:10px;">Filter</div>

    <!-- Multi-check “dropdown” using <details> -->
    <details class="gw-details" id="taxaDetails">
      <summary class="gw-summary">Iconic taxa</summary>
      <div class="gw-checklist" id="taxaChecklist"></div>
      <div class="gw-hint">Selecting filters affects the iNat query + plot.</div>
    </details>
  </div>
</div>
<!-- ─────────────────────────────────────────────────────────────
     END Sidebar UI (collapsible)
     ───────────────────────────────────────────────────────────── -->






  <div class="hud" id="hud">
    <b>GridWild</b>
    <div id="status">Requesting location…</div>
    <button class="btn" id="recenter">Recenter</button>
  </div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

	<script src="js/mapinit.js"></script> 
	<script src="js/initgrid.js"></script> 
	<script src="js/inatscatter.js"></script> 
<!--	<script src="js/osmoverlay.js"></script>     TEMP DISABLED --> 
	<script src="js/location.js"></script> 
  <script src="js/sidebar.js"></script>
	
  <script>
    console.log(`Beginning 10:07am`);
    // UI
    document.getElementById("recenter").addEventListener("click", () => {
      if (lastFix) {
        map.setView([lastFix.latitude, lastFix.longitude], Math.max(map.getZoom(), 10));
      } else {
        requestLocationOnce();
      }
    });

    // Kick off
    requestLocationOnce();
    const watchId = startWatchingLocation();

    // If you ever need to stop tracking:
    // if (watchId !== null) navigator.geolocation.clearWatch(watchId);
  </script>
</body>
</html>
