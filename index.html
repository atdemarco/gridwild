<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GridWild</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; width: 100%; }
    .hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1000;
      background: rgba(255,255,255,0.92);
      padding: 10px 12px;
      border-radius: 12px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-size: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      max-width: calc(100% - 24px);
    }
    .hud b { display: block; margin-bottom: 6px; }
    .btn {
      display: inline-block;
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
      background: white;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:active { transform: translateY(1px); }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="hud" id="hud">
    <b>GridWild</b>
    <div id="status">Requesting location…</div>
    <button class="btn" id="recenter">Recenter</button>
  </div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

	<script src="js/mapinit.js"></script> 
	<script src="js/initgrid.js"></script> 
	<script src="js/initfogofwar.js"></script> 
	<script src="js/inatscatter.js"></script> 
	<script src="js/location.js"></script> 

  <script>
    console.log(`Beginning 10:07am`);
    // ─────────────────────────────────────────────────────────────
    // UI
    // ─────────────────────────────────────────────────────────────
    document.getElementById("recenter").addEventListener("click", () => {
      if (lastFix) {
        map.setView([lastFix.latitude, lastFix.longitude], Math.max(map.getZoom(), 18));
      } else {
        requestLocationOnce();
      }
    });

    // Kick off
    requestLocationOnce();
    const watchId = startWatchingLocation();

    // If you ever need to stop tracking:
    // if (watchId !== null) navigator.geolocation.clearWatch(watchId);
  </script>
</body>
</html>
